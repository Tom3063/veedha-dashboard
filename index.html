async function mondayFetch(query) {
  const resp = await fetch("https://api.monday.com/v2", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": MONDAY_API_KEY,
      "API-Version": "2024-01",
    },
    body: JSON.stringify({ query }),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
  const json = await resp.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join("; "));
  return json.data;
}

async function fetchAllItems(boardId, withSubitems = false) {
  const items = [];
  let cursor = null;
  const subFrag = withSubitems
    ? `subitems { id name column_values { id text value type } }`
    : "";

  const doFetch = async (q, attempt=0) => {
    const resp = await fetch("https://api.monday.com/v2", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": MONDAY_API_KEY,
        "API-Version": "2023-10",
      },
      body: JSON.stringify({ query: q }),
    });
    if (resp.status === 429) {
      if (attempt >= 4) throw new Error("Rate limit excedido. Aguarde 1 minuto e tente novamente.");
      await new Promise(r => setTimeout(r, (attempt + 1) * 3000));
      return doFetch(q, attempt + 1);
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const json = await resp.json();
    if (json.errors) throw new Error(json.errors.map(e => e.message).join("; "));
    return json;
  };

  do {
    const cursorArg = cursor ? `, cursor: "${cursor}"` : "";
    // Query simples sem inline fragments — muito mais leve
    const q = `query {
      boards(ids: [${boardId}]) {
        items_page(limit: 200${cursorArg}) {
          cursor
          items {
            id name
            group { id title }
            column_values { id text value type }
            ${subFrag}
          }
        }
      }
    }`;
    const json = await doFetch(q);
    const page = json.data.boards[0].items_page;
    items.push(...page.items);
    cursor = page.cursor || null;
    if (cursor) await new Promise(r => setTimeout(r, 300));
  } while (cursor);
  return items;
}

// Query separada e leve para resolver linked_items do conectar_quadros
async function fetchOrigLinks(itemIds) {
  if (!itemIds.length) return {};
  const map = {};
  // Processar em lotes de 100
  for (let i = 0; i < itemIds.length; i += 100) {
    const batch = itemIds.slice(i, i + 100);
    const q = `query {
      items(ids: [${batch.join(",")}]) {
        id
        column_values(ids: ["conectar_quadros"]) {
          ... on BoardRelationValue { linked_items { id name } }
        }
      }
    }`;
    const resp = await fetch("https://api.monday.com/v2", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": MONDAY_API_KEY,
        "API-Version": "2023-10",
      },
      body: JSON.stringify({ query: q }),
    });
    if (resp.ok) {
      const json = await resp.json();
      (json.data?.items || []).forEach(item => {
        const li = item.column_values?.[0]?.linked_items;
        if (li?.length) map[item.id] = li[0].name;
      });
    }
    if (i + 100 < itemIds.length) await new Promise(r => setTimeout(r, 500));
  }
  return map;
}

// ── Helpers de coluna ─────────────────────────────────────────────
// IMPORTANTE: usar colId (por ID) — a query não devolve o campo "title"
function colId(cv, id) {
  const c = cv.find(x => x.id === id);
  return c ? (c.text || "").trim() : "";
}

function parseDate(t) {
  if (!t || !t.trim()) return null;
  return t.trim().slice(0, 10);
}

function parseNum(t) {
  if (!t || !t.trim()) return 0;
  const n = parseFloat(t.replace(/[^\d.-]/g, ""));
  return isNaN(n) ? 0 : n;
}

async function fetchDashboardData() {
  // Board IDs fixos — evita falhas na descoberta por nome
  const pipeId = "4323912801";
  const contId = "4323912861";
  const finId  = "4388355289"; // Board real do Controle Financeiro

  // Fetch sequencial para evitar rate limit (429)
  const pipeItems = await fetchAllItems(pipeId, false);
  await new Promise(r => setTimeout(r, 300));
  const contItems = await fetchAllItems(contId, false);
  await new Promise(r => setTimeout(r, 300));
  const finItems  = await fetchAllItems(finId,  true);
  await new Promise(r => setTimeout(r, 300));

  // Buscar originação separadamente (linked_items do conectar_quadros)
  const origMap = await fetchOrigLinks(pipeItems.map(i => i.id));

  // ── Process Contacts → mapas por ID e por nome ─────────────────
  // Tem de ser feito ANTES do Pipeline para resolver board_relation
  const contItemMap = {};
  contItems.forEach(item => { contItemMap[item.id] = item.name; });

  const FILIAL = { "M&A": "M&A" };
  contItems
    .filter(item => item.group.title.trim() === "Assessores & Originadores")
    .forEach(item => {
      const filial = colId(item.column_values, "status0");
      if (item.name && filial) FILIAL[item.name] = filial;
    });

  // ── Process Pipeline ────────────────────────────────────────────
  const PIPE = pipeItems
    .filter(item => item.group.title.trim() !== "Em Análise")
    .map(item => {
      const cv = item.column_values;

      // Fee Potencial — calculado manualmente (formula5 retorna null via API)
      // Fórmula: (Fee de Sucesso% / 100) × Cheque Estimado × 1.000.000, ÷ 0.8885 se Gross Up = Sim
      // Nota: Cheque Estimado (numbers) é em MM — ex: "100" = R$ 100.000.000
      const feeSucesso     = parseNum(colId(cv, "n_meros"));         // Fee de Sucesso (%)
      const chequeEstimado = parseNum(colId(cv, "numbers")) * 1e6;   // Cheque Estimado em BRL
      const grossUp        = colId(cv, "color_mkrw4zwh");            // "Sim" ou "Não"
      let fee = (feeSucesso / 100) * chequeEstimado;
      if (grossUp === "Sim" && fee > 0) fee = fee / 0.8885;

      // Originação — resolvida via origMap (query separada para linked_items)
      const orig = origMap[item.id] || "";

      return {
        el:    item.name,
        etapa: colId(cv, "status"),
        fee:   Math.round(fee * 100) / 100,
        prio:  colId(cv, "status9") || null,
        pr:    parseDate(colId(cv, "data2")),
        ep:    parseDate(colId(cv, "date")),
        ap:    parseDate(colId(cv, "date4")),
        orig,
      };
    });

  // ── Process Financial subitems ──────────────────────────────────
  // Board: 4388355289 | Subitems verificados via console (Parcela 1 do Proj. Egito)
  // n_meros  → Valor Bruto
  // data8    → Data de Pagamento
  // date1    → Data de Emissão
  const finSubitems = [];
  finItems.forEach(item => {
    (item.subitems || []).forEach(sub => {
      const cv = sub.column_values;
      const valorBruto    = parseNum(colId(cv, "n_meros"));
      const dataPagamento = parseDate(colId(cv, "data8"));
      const dataEmissao   = parseDate(colId(cv, "date1"));
      if (valorBruto > 0) {
        finSubitems.push({ valorBruto, dataPagamento, dataEmissao });
      }
    });
  });

  return { PIPE, FILIAL, finSubitems };
}

  const R=32,circ=2*Math.PI*R,off=circ*(1-Math.min(value/Math.max(max,1),1));
  return (
    <div style={{flexShrink:0,width:72,height:72,position:"relative"}}>
      <svg width={72} height={72} viewBox="0 0 72 72" style={{transform:"rotate(-90deg)"}}>
        <circle cx={36} cy={36} r={R} fill="none" stroke="#E5EAF0" strokeWidth={6}/>
        <circle cx={36} cy={36} r={R} fill="none" stroke={color} strokeWidth={6}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .4s ease"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
        textAlign:"center",lineHeight:1.1}}>
        {editing
          ? <input type="number" value={max} onChange={e=>onChange(id,+e.target.value)}

}

  });
  const g3Orig = propAll.map(p=>p.el);

  // ── G4 Receita Faturada/Contratada ─────────────────────────────
  const finKv = (sub, dateField) => sub[dateField] && new Date(sub[dateField]).getFullYear();
  const finKm = (sub, dateField) => sub[dateField] && new Date(sub[dateField]).getMonth()+1;
  // Filtro: Faturada = dataEmissao <= mês do filtro (no ano seleccionado)
  //         Contratada = dataEmissao > mês do filtro
  // Total ano anterior = dataEmissao no ano anterior
  const prevTotal = finSubitems
    .filter(s=>s.dataEmissao&&finKv(s,"dataEmissao")===yr-1)
    .reduce((a,s)=>a+s.valorBruto,0)/1000;
  const monthlyFin = MOS.map((_,i)=>{
    const m=i+1;
    return finSubitems
      .filter(s=>s.dataEmissao&&finKv(s,"dataEmissao")===yr&&finKm(s,"dataEmissao")===m)
      .reduce((a,s)=>a+s.valorBruto,0)/1000;
  });
  const yearTotal = monthlyFin.reduce((a,v)=>a+v,0);
  const g4Data = [
    {name:`Total ${yr-1}`,v:+prevTotal.toFixed(2),tipo:"anterior"},
    ...MOS.map((mn,i)=>({
      name:`${mn.toLowerCase()}-${String(yr).slice(2)}`,
      v:+monthlyFin[i].toFixed(2),
      tipo: i+1<=mo ? "faturada" : "contratada"  // Emissão <= filtro = Faturada; > filtro = Contratada
    })),
    {name:"Total Acum.",v:+yearTotal.toFixed(2),tipo:"totalAno"},
  ];
  const barC = t => t==="anterior"?T.gray:t==="faturada"?T.primary:t==="contratada"?T.blue:T.lime;

  // ── G5 Receita Potencial (sem filtro de data) ───────────────────
  const conqsAll = PIPE.filter(p=>p.etapa==="Conquistado");
  const conqs    = conqsAll.filter(p=>!g5Hidden.includes(p.el));
  const totConqs = conqs.reduce((s,p)=>s+p.fee,0);
  // Agrupar por fase (igual G3 agrupa por prioridade)
  const g5Grp = {};
  PHASES.forEach(ph=>g5Grp[ph]=[]);
  conqs.forEach(p=>{ const ph=phases[p.el]||"Roadshow"; (g5Grp[ph]||g5Grp["Roadshow"]).push(p); });
  const g5Data = [];
  PHASES.forEach(ph=>{
    g5Grp[ph].sort((a,b)=>b.fee-a.fee).forEach(p=>
      g5Data.push({origName:p.el,name:g5Labels[p.el]||p.el,v:+(p.fee/1000).toFixed(2),fase:ph}));
  });
  g5Data.push({origName:"Receita Potencial",name:"Rec. Potencial",v:+(totConqs/1000).toFixed(2),fase:"__total__"});
  const g5Orig = conqsAll.map(p=>p.el);

  const funil = [
    {label:"Leads Novos",       val:leadsM,bg:T.grayLt,color:T.grayLt,real:leadsY,id:"leads",goal:goals.leads},
    {label:"Propostas Enviadas",val:propoM,bg:T.gray,  color:T.gray,  real:propoY,id:"prop", goal:goals.prop},
    {label:"Mandatos Assinados",val:mandM, bg:T.primary,color:T.primary,real:mandY,id:"mand",goal:goals.mand},
  ];

  const EditBtn = (activeLabel, onClickLabel, activeFilter, onClickFilter) => (
    <div style={{display:"flex",gap:4}}>
      <button onClick={onClickFilter} style={{background:activeFilter?T.primary:"none",
        border:`1px solid ${T.primary}`,borderRadius:5,fontSize:9,
        color:activeFilter?"white":T.primary,padding:"2px 8px",cursor:"pointer",
        fontFamily:"Montserrat",fontWeight:600}}>
        {activeFilter?"✓ Filtro":"⊟ Filtro"}
      </button>
      <button onClick={onClickLabel} style={{background:"none",border:`1px solid ${T.primary}`,
        borderRadius:5,fontSize:9,color:T.primary,padding:"2px 8px",cursor:"pointer",
        fontFamily:"Montserrat",fontWeight:600}}>
        {activeLabel?"✓ Fechar":"✎ Labels"}
      </button>
    </div>
  );

  const SEL = {fontFamily:"Montserrat",fontSize:11,fontWeight:600,padding:"6px 10px",
    borderRadius:7,border:"1px solid rgba(255,255,255,0.35)",background:"#007A63",
    color:"white",outline:"none",appearance:"none",WebkitAppearance:"none",
    cursor:"pointer",paddingRight:24};

  return (
    <div style={{fontFamily:"Montserrat,sans-serif",background:T.bg,minHeight:"100vh"}}>
      {loading && <LoadingOverlay/>}

      {/* HEADER */}
      <div style={{background:"#00987B",padding:"11px 24px",display:"flex",alignItems:"center",
        justifyContent:"space-between",boxShadow:"0 3px 20px rgba(0,0,0,0.18)",
        position:"sticky",top:0,zIndex:99}}>
        <VeedhaLogo/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:10,fontWeight:600}}>Período</span>
          <div style={{position:"relative",display:"inline-block"}}>
            <select value={mo} onChange={e=>setMo(+e.target.value)} style={SEL}>
              {MOS.map((m,i)=><option key={m} value={i+1}>{m}</option>)}
            </select>
            <span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",
              pointerEvents:"none",color:"white",fontSize:9}}>▾</span>
          </div>
          <div style={{position:"relative",display:"inline-block"}}>
            <select value={yr} onChange={e=>setYr(+e.target.value)} style={SEL}>
              {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",
              pointerEvents:"none",color:"white",fontSize:9}}>▾</span>
          </div>
          <button onClick={loadData} disabled={loading}
            style={{background:T.lime,color:"#1E2330",border:"none",borderRadius:7,
              padding:"7px 16px",fontFamily:"Montserrat",fontSize:11,fontWeight:700,
              cursor:loading?"not-allowed":"pointer",opacity:loading?0.6:1}}>
            {loading?"…":"↻ Refresh"}
          </button>
        </div>
      </div>

      {/* BODY */}
      <div style={{padding:"18px 22px",display:"flex",flexDirection:"column",gap:14}}>
        {error && <ErrorBanner msg={error} onRetry={loadData}/>}

        {/* ROW 1 — Funil + Propostas */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1.55fr",gap:14}}>

          {/* G1 FUNIL */}
          <Card>
            <div style={{fontSize:10,fontWeight:700,color:T.primary,textTransform:"uppercase",
              letterSpacing:"0.1em",marginBottom:14,paddingLeft:9,borderLeft:`3px solid ${T.primary}`,
              display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>{`Funil de Conversão · ${MOS[mo-1]}/${yr}`}</span>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:8,color:T.muted,fontWeight:600,textTransform:"uppercase",
                  letterSpacing:"0.08em"}}>Meta Anual</span>
                <button onClick={()=>setEditGoals(!editGoals)}
                  style={{background:"none",border:"none",cursor:"pointer",padding:0,
                    color:editGoals?T.primary:T.muted,fontSize:13,lineHeight:1}}>✎</button>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {funil.map((item,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,marginLeft:i*8,marginRight:i*5}}>
                    <div style={{background:item.bg,borderRadius:7,padding:"13px 14px",
                      display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:62}}>
                      <span style={{color:"#fff",fontSize:12,fontWeight:600}}>{item.label}</span>
                      <span style={{color:"#fff",fontSize:22,fontWeight:800,lineHeight:1}}>{item.val}</span>
                    </div>
                  </div>
                  <Donut value={item.real} max={item.goal} color={item.color}
                    editing={editGoals} id={item.id}
                    onChange={(k,v)=>setGoals(g=>({...g,[k]:v}))}/>
                </div>
              ))}
            </div>
          </Card>

          {/* G3 PROPOSTAS */}
          <Card>
            <STitle extra={EditBtn(editG3,()=>setEditG3(!editG3),editG3Filter,()=>setEditG3Filter(!editG3Filter))}>Valor por Proposta (BRL K)</STitle>
            <div style={{display:"flex",gap:10,marginBottom:10,padding:"7px 10px",
              background:T.bg,borderRadius:8,flexWrap:"wrap",alignItems:"center"}}>
              {g3Sum.filter(s=>s.tot>0).map(({pr,tot,pct})=>(
                <div key={pr} style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:7,height:7,borderRadius:2,background:PRIO_C[pr]}}/>
                  <span style={{fontSize:9,fontWeight:700,color:PRIO_C[pr]}}>{pr}:</span>
                  <span style={{fontSize:9,color:T.muted}}>{fBRL(tot/1000)}</span>
                  <span style={{fontSize:8,color:T.muted,background:"#E5E7EB",borderRadius:10,
                    padding:"1px 5px",fontWeight:600}}>{pct}%</span>
                </div>
              ))}
              <span style={{marginLeft:"auto",fontSize:9,fontWeight:700,color:T.txt}}>
                Total: {fBRL(totProp/1000)}
              </span>
            </div>
            {editG3Filter&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,padding:"8px 10px",
                background:T.bg,borderRadius:8,border:`1px solid ${T.primary}40`}}>
                {g3Orig.map(el=>{
                  const hidden=g3Hidden.includes(el);
                  return <button key={el} onClick={()=>setG3Hidden(h=>hidden?h.filter(x=>x!==el):[...h,el])}
                    style={{padding:"3px 10px",borderRadius:20,fontSize:9,fontWeight:600,cursor:"pointer",
                      border:`1px solid ${hidden?T.grayLt:T.primary}`,fontFamily:"Montserrat",
                      background:hidden?"#F0F0F0":"white",color:hidden?T.muted:T.primary,
                      textDecoration:hidden?"line-through":"none"}}>
                    {g3Labels[el]||el}
                  </button>;
                })}
                <button onClick={()=>setG3Hidden([])}
                  style={{padding:"3px 10px",borderRadius:20,fontSize:9,cursor:"pointer",
                    border:"none",background:T.lime,color:"#1E2330",fontFamily:"Montserrat",fontWeight:700}}>
                  Mostrar todos
                </button>
              </div>
            )}
            <ResponsiveContainer width="100%" height={185}>
              <BarChart data={g3Data} margin={{top:16,right:6,left:0,bottom:44}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
                <XAxis dataKey="name" tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}
                  angle={-40} textAnchor="end" interval={0} height={52}/>
                <YAxis tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}} tickFormatter={fAxis} width={46}/>
                <Tooltip formatter={v=>[fBRL(v),"Fee Potencial"]} contentStyle={TTS}/>
                <Bar dataKey="v" radius={[4,4,0,0]} maxBarSize={30}>
                  <LabelList dataKey="v" position="top" formatter={v=>fBRL(v)}
                    style={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}/>
                  {g3Data.map((d,i)=><Cell key={i} fill={d.prio==="__total__"?T.lime:(PRIO_C[d.prio]||T.gray)}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
            {editG3&&<EditLabelPanel items={g3Orig} labels={g3Labels} setLabels={setG3Labels} onClose={()=>setEditG3(false)}/>}
            <Lgd items={[{c:T.blue,l:"Alta"},{c:T.primary,l:"Média"},{c:T.gray,l:"Baixa"},{c:T.lime,l:"Total"}]}/>
          </Card>
        </div>

        {/* ROW 2 — KPIs Leads */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <Card>
            <STitle>{`Top Geradores de Leads · ${yr}`}</STitle>
            {topOrig.length===0
              ? <div style={{color:T.muted,fontSize:11,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>
                  {loading?"A carregar…":"Sem dados para o período"}
                </div>
              : <ResponsiveContainer width="100%" height={Math.max(130,topOrig.length*32)}>
                  <BarChart data={topOrig} layout="vertical" margin={{top:0,right:36,left:4,bottom:0}}>
                    <XAxis type="number" hide/>
                    <YAxis type="category" dataKey="n"
                      tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}} width={122}/>
                    <Tooltip formatter={v=>[v,"Leads"]} contentStyle={TTS}/>
                    <Bar dataKey="v" fill={T.primary} radius={[0,4,4,0]} maxBarSize={18}>
                      <LabelList dataKey="v" position="right"
                        style={{fontSize:10,fontFamily:"Montserrat",fill:T.gray,fontWeight:700}}/>
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
            }
          </Card>
          <Card>
            <STitle>{`Leads por Escritório · ${yr}`}</STitle>
            {topFil.length===0
              ? <div style={{color:T.muted,fontSize:11,textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>
                  {loading?"A carregar…":"Sem dados para o período"}
                </div>
              : <ResponsiveContainer width="100%" height={Math.max(130,topFil.length*32)}>
                  <BarChart data={topFil} layout="vertical" margin={{top:0,right:36,left:4,bottom:0}}>
                    <XAxis type="number" hide/>
                    <YAxis type="category" dataKey="n"
                      tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}} width={132}/>
                    <Tooltip formatter={v=>[v,"Leads"]} contentStyle={TTS}/>
                    <Bar dataKey="v" fill={T.blue} radius={[0,4,4,0]} maxBarSize={18}>
                      <LabelList dataKey="v" position="right"
                        style={{fontSize:10,fontFamily:"Montserrat",fill:T.gray,fontWeight:700}}/>
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
            }
          </Card>
        </div>

        {/* ROW 3 — Receita */}
        <Card>
          <STitle>{`Receita Faturada / Contratada (BRL K) · ${yr}`}</STitle>
          <Lgd items={[{c:T.gray,l:`Total ${yr-1}`},{c:T.primary,l:"Faturada"},{c:T.blue,l:"Contratada"},{c:T.lime,l:`Total ${yr}`}]}/>
          <ResponsiveContainer width="100%" height={215} style={{marginTop:8}}>
            <BarChart data={g4Data} margin={{top:18,right:6,left:2,bottom:4}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
              <XAxis dataKey="name" tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}/>
              <YAxis tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}} tickFormatter={fAxis} width={46}/>
              <Tooltip formatter={(v,_,p)=>[`R$ ${fBRL(v)}`,
                p.payload.tipo==="anterior"?`Total ${yr-1}`:
                p.payload.tipo==="faturada"?"Faturada":
                p.payload.tipo==="contratada"?"Contratada":"Total Acum."]}
                contentStyle={TTS}/>
              <Bar dataKey="v" radius={[4,4,0,0]} maxBarSize={34}>
                <LabelList dataKey="v" position="top" formatter={v=>v>0?fBRL(v):""}
                  style={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}/>
                {g4Data.map((d,i)=><Cell key={i} fill={barC(d.tipo)}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Card>

        {/* ROW 4 — Potencial */}
        <Card>
          <STitle extra={EditBtn(editG5,()=>setEditG5(!editG5),editG5Filter,()=>setEditG5Filter(!editG5Filter))}>
            Receita Potencial por Mandato (BRL K) · Conquistados
          </STitle>
          <div style={{fontSize:10,color:T.muted,marginBottom:8}}>
            💡 Clique numa barra para definir a fase do mandato
          </div>
          {editG5Filter&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,padding:"8px 10px",
              background:T.bg,borderRadius:8,border:`1px solid ${T.primary}40`}}>
              {g5Orig.map(el=>{
                const hidden=g5Hidden.includes(el);
                return <button key={el} onClick={()=>setG5Hidden(h=>hidden?h.filter(x=>x!==el):[...h,el])}
                  style={{padding:"3px 10px",borderRadius:20,fontSize:9,fontWeight:600,cursor:"pointer",
                    border:`1px solid ${hidden?T.grayLt:T.primary}`,fontFamily:"Montserrat",
                    background:hidden?"#F0F0F0":"white",color:hidden?T.muted:T.primary,
                    textDecoration:hidden?"line-through":"none"}}>
                  {g5Labels[el]||el}
                </button>;
              })}
              <button onClick={()=>setG5Hidden([])}
                style={{padding:"3px 10px",borderRadius:20,fontSize:9,cursor:"pointer",
                  border:"none",background:T.lime,color:"#1E2330",fontFamily:"Montserrat",fontWeight:700}}>
                Mostrar todos
              </button>
            </div>
          )}
          <ResponsiveContainer width="100%" height={235}>
            <BarChart data={g5Data} margin={{top:18,right:6,left:2,bottom:44}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#F0F0F0" vertical={false}/>
              <XAxis dataKey="name" tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}
                angle={-35} textAnchor="end" interval={0} height={52}/>
              <YAxis tick={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}} tickFormatter={fAxis} width={46}/>
              <Tooltip formatter={(v,_,p)=>[`R$ ${fBRL(v)}`,
                p.payload.fase==="__total__"?"Total Potencial":p.payload.fase]}
                contentStyle={TTS}/>
              <Bar dataKey="v" radius={[4,4,0,0]} maxBarSize={42}
                onClick={d=>{ if(d&&d.fase!=="__total__") setSelPhase(selPhase===d.origName?null:d.origName); }}>
                <LabelList dataKey="v" position="top" formatter={v=>fBRL(v)}
                  style={{fontSize:10,fontFamily:"Montserrat",fill:T.gray}}/>
                {g5Data.map((d,i)=>(
                  <Cell key={i} fill={d.fase==="__total__"?T.lime:(PHASE_C[d.fase]||T.gray)}
                    cursor={d.fase!=="__total__"?"pointer":"default"}
                    stroke={selPhase===d.origName?"#333":"none"}
                    strokeWidth={selPhase===d.origName?2:0}/>
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>

          {selPhase&&(
            <div style={{background:T.bg,borderRadius:10,padding:"11px 14px",marginTop:8,
              border:`1px solid ${T.primary}40`}}>
              <div style={{fontSize:10,fontWeight:600,color:T.txt,marginBottom:8}}>
                Fase de <span style={{color:T.primary,fontWeight:700}}>{g5Labels[selPhase]||selPhase}</span>:
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {PHASES.map(ph=>{
                  const active=phases[selPhase]===ph;
                  return <button key={ph}
                    onClick={()=>{setPhases(p=>({...p,[selPhase]:ph}));setSelPhase(null);}}
                    style={{padding:"4px 12px",borderRadius:20,fontSize:9,fontWeight:700,
                      cursor:"pointer",border:"none",fontFamily:"Montserrat",
                      background:active?PHASE_C[ph]:"#E3E6EA",
                      color:active?"#fff":T.gray,
                      boxShadow:active?"0 1px 4px rgba(0,0,0,0.15)":"none"}}>{ph}</button>;
                })}
                <button onClick={()=>setSelPhase(null)}
                  style={{padding:"4px 11px",borderRadius:20,fontSize:9,cursor:"pointer",
                    border:"none",background:"#E3E6EA",color:T.gray,
                    fontFamily:"Montserrat",fontWeight:600}}>✕</button>
              </div>
            </div>
          )}

          {editG5&&<EditLabelPanel items={g5Orig} labels={g5Labels} setLabels={setG5Labels} onClose={()=>setEditG5(false)}/>}
          <Lgd items={[...PHASES.map(ph=>({c:PHASE_C[ph],l:ph})),{c:T.lime,l:"Total Potencial"}]}/>
        </Card>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
